<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rock, Paper, Scissors Game! </title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header id="header">
        <div class="title">
            Rock, Paper, Scissors Game!
        </div>
    </header>

    <main class="game_area">
        <div class="player_info">
            <h1 class="h1"> Player's Choice </h1>
                <p class="hand-choice-image" id="playerHand">
                        <button type="button" id="rock" class="button" onClick="playerSelectionPlay(this.value)" value="rock"><img src="rock.webp" class="rock" onclick="rock" value="rock"> Rock </button>
                        <button type="button" id="paper" class="button" onClick="playerSelectionPlay(this.value)" value="paper"><img src="paper.webp" class="paper" onclick="paper" value="paper"> Paper </button>
                        <button type="button" id="scissors" class="button" onClick="playerSelectionPlay(this.value)" value="scissors"><img src="scissors.webp" class="scissors" onclick="scissors" value="scissors"> Scissors </button>
                </p>
            <h2 class="result"> Result = </h2>
        </div>

        <div class="computer_info">
            <h1 class="h2"> Computer's Choice </h1>
            <h2 class="result">Computer plays </h2>
        </div>
    </main>

    <script type="text/javascript" src="script.js"></script>
</body>
</html>
