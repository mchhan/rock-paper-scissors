<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rock, Paper, Scissors Game! </title>
    <script src="script.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <header id="header">
        <div class="title">
            Rock, Paper, Scissors Game!
        </div>
    </header>

    <main class="game_area">
        <div class="player_info">
            <h1 class="h1"> Player's Choice </h1>
                <p class="hand_choice_image">
                        <img src="rock.webp" class="rock">
                        <img src="paper.webp" class="paper">
                        <img src="scissors.webp" class="scissors">
                </p>
        </div>

        <div class="computer_info">
            <h1 class="h2"> Computer Plays </h1>
        </div>
    </main>
</body>
</html>
